name: Auto School Schedule
on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:      # Lets you click "Run" manually

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Vital: Gives the AI permission to save files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests beautifulsoup4 pdfplumber pandas

      - name: Run Scraper
        run: python scraper.py

      - name: Save Professor List to GitHub
        run: |
          git config --global user.name "Schedule-Bot"
          git config --global user.email "bot@github.com"
          git add professors.txt
          git commit -m "AI update: New Professor List" || exit 0
          git push
