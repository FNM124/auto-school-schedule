name: Auto School Schedule
on:
  workflow_dispatch:      # Gives you the manual 'Run' button
  schedule:
    - cron: '0 */2 * * *' # Automatically runs every 2 hours

jobs:
  run-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Vital: Allows the bot to save professors.txt
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pdfplumber

      - name: Run Scraper
        run: python scraper.py

      - name: Save Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add professors.txt || echo "No file created"
          git commit -m "AI automated update" || exit 0
          git push
