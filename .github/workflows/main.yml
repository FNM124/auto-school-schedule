name: Auto School Schedule
on:
  workflow_dispatch:      # Allows the manual 'Run workflow' button
  schedule:
    - cron: '0 */2 * * *' # Runs automatically every 2 hours

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Vital: Allows saving files back to the repository
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests beautifulsoup4 pdfplumber

      - name: Run Scraper
        run: python scraper.py

      - name: Save Results to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add professors.txt || echo "No file to add"
          git commit -m "Auto-update: New Professor List" || exit 0
          git push
          
      - name: Instant Deploy to InfinityFree
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /htdocs/
        
