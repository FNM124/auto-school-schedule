name: Auto School Schedule
on:
  schedule:
    - cron: '0 */2 * * *' # This tells it to run every 2 hours
  workflow_dispatch:      # This adds a "Run Now" button for testing

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install requests beautifulsoup4 pdfplumber pandas

      - name: Run the AI
        run: python scraper.py
        
